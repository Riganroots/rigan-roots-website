<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Experience Detail | Rigan Roots & Routes</title>
<link rel="stylesheet" href="experience-v2.css" />
</head>

<body>

<section class="detail-page-v2">
  <div class="detail-hero-v2" id="detailHeroV2">
    <div class="detail-hero-overlay-v2"></div>
    <div class="detail-hero-content-v2">
      <p class="detail-label-v2">Rigan Experience</p>
      <h1 id="detailTitleV2">Loading...</h1>
      <p id="detailSubtitleV2">Please wait...</p>
    </div>
  </div>

  <div class="detail-container-v2">
    <div class="detail-grid-v2">
      <div class="detail-main-v2">
        <div class="detail-section-v2">
          <h2>Overview</h2>
          <p id="detailOverviewV2"></p>
        </div>

        <div class="detail-section-v2">
          <h2>Highlights</h2>
          <ul id="detailHighlightsV2"></ul>
        </div>

        <div class="detail-section-v2">
          <h2>Sample Itinerary</h2>
          <div id="detailItineraryV2"></div>
        </div>
      </div>

      <aside class="detail-sidebar-v2">
        <div class="booking-card-v2">
          <h3>Quick Info</h3>
          <p><strong>Duration:</strong> <span id="detailDurationV2"></span></p>
          <p><strong>Price:</strong> <span id="detailPriceV2"></span></p>
          <p><strong>Location:</strong> <span id="detailLocationV2"></span></p>

          <a href="#" class="book-btn-v2" id="whatsappBookBtn" target="_blank">Book This Experience</a>
          <a href="experience-v2.html" class="book-btn-v2" style="margin-top:12px;background:#333;">Back to Experiences</a>
        </div>
      </aside>
    </div>
  </div>
</section>

<script>
const experienceData = {
  "live-like-a-nepali": {
    name: "Live Like a Nepali",
    subtitle: "Stay with locals, eat home-cooked food, and experience everyday Nepal.",
    overview: "A meaningful cultural stay with local families, village routines, food, farming, and real Nepali hospitality.",
    duration: "7 Days",
    price: "From $650",
    location: "Nepal",
    image: "https://i.postimg.cc/9M6dDyqv/live-like-nepali-jpg.jpg",
    highlights: ["Local family stay", "Home-cooked meals", "Village life", "Cultural exchange"],
    itinerary: [
      { day: "Day 01", text: "Arrival, welcome, and introduction to your host family." },
      { day: "Day 02", text: "Join daily village life, cooking, farming, and cultural activities." }
    ]
  },

  "taste-of-nepal": {
    name: "Taste of Nepal",
    subtitle: "Discover Nepal through food, kitchens, markets, and family recipes.",
    overview: "A hands-on food journey where travelers cook with locals, explore markets, and share traditional Nepali meals.",
    duration: "3 Days",
    price: "From $180",
    location: "Kathmandu Valley",
    image: "https://i.postimg.cc/9M6dDy7m/taste-of-nepal-jpg.jpg",
    highlights: ["Momo making", "Dal bhat experience", "Local market visit", "Family meal"],
    itinerary: [
      { day: "Day 01", text: "Visit a local market and learn about Nepali spices." },
      { day: "Day 02", text: "Cook momo and dal bhat with a local family." }
    ]
  },

  "festival-experience": {
    name: "Festival of Nepal",
    subtitle: "Celebrate Nepal’s festivals with local families and communities.",
    overview: "Join real festival moments, rituals, food, music, blessings, and family gatherings during Nepal’s special seasons.",
    duration: "Seasonal",
    price: "Custom",
    location: "Across Nepal",
    image: "https://i.postimg.cc/SsB6ncz1/festival-experience-jpg.jpg",
    highlights: ["Dashain experience", "Tihar lights", "Local rituals", "Festival food"],
    itinerary: [
      { day: "Day 01", text: "Meet your host family and learn about festival traditions." },
      { day: "Day 02", text: "Join celebration, food preparation, rituals, and cultural moments." }
    ]
  },

  "annapurna-base-camp": {
    name: "Annapurna Base Camp",
    subtitle: "A classic Himalayan journey through villages, forests, and mountain views.",
    overview: "Trek through the Annapurna region and reach one of Nepal’s most iconic base camps surrounded by Himalayan peaks.",
    duration: "12 Days",
    price: "From $900",
    location: "Annapurna Region",
    image: "https://i.postimg.cc/VNHBcxsc/annapurna-base-camp-jpg.jpg",
    highlights: ["Mountain villages", "Forest trails", "Base camp views", "Local lodges"],
    itinerary: [
      { day: "Day 01", text: "Arrive in Kathmandu and prepare for the trek." },
      { day: "Day 02", text: "Travel to Pokhara and begin the Annapurna journey." }
    ]
  }
};

const params = new URLSearchParams(window.location.search);
const experienceId = params.get("experience") || params.get("id");
const selectedExperience = experienceData[experienceId];

if (!selectedExperience) {
  document.getElementById("detailTitleV2").textContent = "Experience Not Found";
  document.getElementById("detailSubtitleV2").textContent = "Please open this page from the Experiences page.";
  document.getElementById("detailOverviewV2").textContent = "Missing or wrong experience ID in the URL.";
} else {
  document.title = selectedExperience.name + " | Rigan Roots & Routes";

  document.getElementById("detailHeroV2").style.backgroundImage =
    `linear-gradient(rgba(10,94,59,.55), rgba(6,74,45,.78)), url('${selectedExperience.image}')`;

  document.getElementById("detailTitleV2").textContent = selectedExperience.name;
  document.getElementById("detailSubtitleV2").textContent = selectedExperience.subtitle;
  document.getElementById("detailOverviewV2").textContent = selectedExperience.overview;
  document.getElementById("detailDurationV2").textContent = selectedExperience.duration;
  document.getElementById("detailPriceV2").textContent = selectedExperience.price;
  document.getElementById("detailLocationV2").textContent = selectedExperience.location;

  document.getElementById("detailHighlightsV2").innerHTML =
    selectedExperience.highlights.map(item => `<li>${item}</li>`).join("");

  document.getElementById("detailItineraryV2").innerHTML =
    selectedExperience.itinerary.map(day => `
      <div class="itinerary-day-v2">
        <h4>${day.day}</h4>
        <p>${day.text}</p>
      </div>
    `).join("");

  const message = encodeURIComponent(
    `Hi Rigan Roots & Routes, I am interested in ${selectedExperience.name}. Please send me details.`
  );

  document.getElementById("whatsappBookBtn").href =
    `https://wa.me/9779843322695?text=${message}`;
}
</script>

</body>
</html>
