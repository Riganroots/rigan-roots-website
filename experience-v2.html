<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Experiences | Rigan Roots & Routes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Inter",sans-serif;
  background:
    linear-gradient(135deg,#174d2f,#2f6b3f,#9b6238,#f7f0e4);
  background-size:300% 300%;
  animation:bgMove 12s ease infinite;
  color:#101815;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.wrapper{
  min-height:100vh;
  padding:30px;
}

/* NAV */
.nav{
  max-width:1300px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 22px;
  border-radius:26px;
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(12px);
}

.nav a{
  text-decoration:none;
  font-weight:800;
  color:#174d2f;
}

.plan-btn{
  background:#174d2f;
  color:white;
  padding:12px 22px;
  border-radius:999px;
}

/* MAIN */
.shell{
  max-width:1300px;
  margin:30px auto;
  display:grid;
  grid-template-columns:320px 1fr;
  gap:26px;
}

/* LEFT */
.sidebar{
  background:rgba(255,255,255,.35);
  backdrop-filter:blur(18px);
  border-radius:30px;
  padding:26px;
}

.label{
  font-size:13px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#174d2f;
  font-weight:900;
  margin-bottom:25px;
}

.tab{
  width:100%;
  border:none;
  background:transparent;
  padding:16px;
  margin-bottom:10px;
  border-radius:16px;
  text-align:left;
  font-weight:800;
  cursor:pointer;
  transition:.3s;
}

.tab:hover,
.tab.active{
  background:#174d2f;
  color:white;
  transform:translateX(6px);
}

/* RIGHT */
.content{
  background:#fffaf2;
  border-radius:30px;
  padding:30px;
  display:grid;
  grid-template-columns:1.2fr 380px;
  gap:26px;
}

.title{
  font-size:13px;
  letter-spacing:4px;
  font-weight:900;
  color:#888;
  margin-bottom:25px;
}

.title span{
  color:#174d2f;
}

/* OPTIONS */
.grid{
  display:grid;
  gap:18px;
}

.option{
  display:grid;
  grid-template-columns:80px 1fr auto;
  gap:16px;
  align-items:center;
  padding:14px;
  border-radius:20px;
  background:white;
  text-decoration:none;
  color:#101815;
  transition:.3s;
}

.option:hover{
  transform:translateY(-4px);
  box-shadow:0 12px 30px rgba(0,0,0,.12);
}

.option img{
  width:80px;
  height:70px;
  object-fit:cover;
  border-radius:14px;
}

.days{
  background:#174d2f;
  color:white;
  padding:7px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

/* PREVIEW */
.preview{
  position:relative;
  border-radius:26px;
  overflow:hidden;
  min-height:500px;
}

.preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
}

.preview-content{
  position:absolute;
  bottom:0;
  padding:26px;
  color:white;
}

.preview h2{
  font-family:"Playfair Display",serif;
  font-size:36px;
}

.preview p{
  margin-top:10px;
  font-size:14px;
}

.preview a{
  display:inline-block;
  margin-top:16px;
  background:white;
  color:#174d2f;
  padding:12px 20px;
  border-radius:999px;
  text-decoration:none;
  font-weight:900;
}

@media(max-width:900px){
  .shell,.content{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="nav">
    <a href="index.html">← Back</a>
    <a href="plan.html" class="plan-btn">Plan My Trip</a>
  </div>

  <div class="shell">

    <!-- LEFT -->
    <div class="sidebar">
      <div class="label">Choose Your Vibe</div>

      <button class="tab active" data-cat="signature">Signature ⭐</button>
      <button class="tab" data-cat="village">Village Life</button>
      <button class="tab" data-cat="food">Taste Nepal</button>
      <button class="tab" data-cat="festival">Festival 🎉</button>
      <button class="tab" data-cat="trek">Trekking</button>
    </div>

    <!-- RIGHT -->
    <div class="content">

      <div>
        <div class="title">Experience › <span id="catName">Signature</span></div>
        <div class="grid" id="list"></div>
      </div>

      <div class="preview">
        <img id="pimg" src="">
        <div class="overlay"></div>
        <div class="preview-content">
          <h2 id="ptitle"></h2>
          <p id="psub"></p>
          <a id="plink">View →</a>
        </div>
      </div>

    </div>

  </div>
</div>

<script>
const data={
  signature:[
    ["Live Like a Nepali","Stay with locals","7 Days","live-like-a-nepali","https://i.postimg.cc/9M6dDyqv/live-like-nepali-jpg.jpg"],
    ["Village Immersion","Rural Nepal life","5 Days","village-immersion","https://i.postimg.cc/sXQPfT1b/village-immersion-jpg.jpg"]
  ],
  village:[
    ["Farm Experience","Farming & food","2 Days","farm","https://i.postimg.cc/V6xprDjC/anjoe-paul-RANHGW3gv-Kk-unsplash.jpg"]
  ],
  food:[
    ["Taste of Nepal","Cook local food","3 Days","food","https://i.postimg.cc/9M6dDy7m/taste-of-nepal-jpg.jpg"]
  ],
  festival:[
    ["Festival Nepal","Dashain & Tihar","Seasonal","fest","https://i.postimg.cc/SsB6ncz1/festival-experience-jpg.jpg"]
  ],
  trek:[
    ["Annapurna Base Camp","Classic trek","12 Days","abc","https://i.postimg.cc/VNHBcxsc/annapurna-base-camp-jpg.jpg"]
  ]
};

const tabs=document.querySelectorAll(".tab");
const list=document.getElementById("list");

const pimg=document.getElementById("pimg");
const ptitle=document.getElementById("ptitle");
const psub=document.getElementById("psub");
const plink=document.getElementById("plink");
const catName=document.getElementById("catName");

function render(cat){
  catName.textContent=cat;

  const items=data[cat];
  updatePreview(items[0]);

  list.innerHTML=items.map(i=>`
    <a class="option" href="experience-detail-v2.html?experience=${i[3]}"
    onmouseenter='updatePreview(${JSON.stringify(i)})'>
      <img src="${i[4]}">
      <div>
        <strong>${i[0]}</strong><br>
        <small>${i[1]}</small>
      </div>
      <span class="days">${i[2]}</span>
    </a>
  `).join("");
}

function updatePreview(i){
  pimg.src=i[4];
  ptitle.textContent=i[0];
  psub.textContent=i[1];
  plink.href="experience-detail-v2.html?experience="+i[3];
}

tabs.forEach(t=>{
  t.onclick=()=>{
    tabs.forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    render(t.dataset.cat);
  }
});

render("signature");
</script>

</body>
</html>
