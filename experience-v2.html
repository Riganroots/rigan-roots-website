<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experiences V2 | Rigan Roots & Routes</title>
  <link rel="stylesheet" href="experience-v2.css" />
</head>
<body>

  <section class="experience-showcase-v2">
    <div class="experience-shell-v2">

      <aside class="experience-sidebar-v2">
        <p class="sidebar-label-v2">Explore Experiences</p>

        <button class="sidebar-item-v2 active" data-region="signature">Signature Experiences</button>
        <button class="sidebar-item-v2" data-region="trekking">Trekking & Mountain Journeys</button>
        <button class="sidebar-item-v2" data-region="spiritual">Spiritual & Heritage</button>
        <button class="sidebar-item-v2" data-region="adventure">Adventure & Adrenaline</button>
        <button class="sidebar-item-v2" data-region="hidden">Hidden Gems & Offbeat Nepal</button>
        <button class="sidebar-item-v2" data-region="festivals">Festival & Seasonal Experiences</button>
      </aside>

      <div class="experience-main-v2">
        <div class="experience-breadcrumb-v2">
          <span>Experiences</span>
          <span>›</span>
          <strong id="experienceTitleV2">Signature Experiences</strong>
        </div>

        <div class="experience-content-grid-v2">
          <div class="experience-list-v2" id="experienceListV2"></div>

          <div class="experience-feature-card-v2" id="featureCardV2">
            <div class="feature-overlay-v2"></div>
            <div class="feature-content-v2">
              <span class="feature-tag-v2">Curated Journeys</span>
              <h3 id="featureHeadingV2">Signature Experiences</h3>
              <p id="featureTextV2">
                Discover deeper, more meaningful journeys designed to help travelers feel Nepal through people, culture, food, and unforgettable moments.
              </p>
              <a href="experiences-v2.html?category=signature" class="feature-btn-v2" id="featureBtnV2">
                View All Packages <span>→</span>
              </a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script src="experience-data-v2.js"></script>
</body>
</html>
