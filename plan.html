<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Your Journey | Rigan Roots & Routes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:Inter,sans-serif;
  background:#fafaf9;
  margin:0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1{
  font-family:"Playfair Display";
  font-size:42px;
}

.form-box{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

input,select,textarea{
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  width:100%;
}

textarea{
  grid-column:span 2;
}

.btn{
  background:#991b1b;
  color:white;
  padding:14px;
  border:none;
  border-radius:999px;
  cursor:pointer;
  margin-top:15px;
}

/* PRICE BOX */
.price-box{
  background:#f3f4f6;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

.price-box h3{
  margin-bottom:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
}

.whatsapp a{
  background:#25D366;
  color:white;
  padding:12px 18px;
  border-radius:999px;
  text-decoration:none;
}

@media(max-width:768px){
  .grid{grid-template-columns:1fr}
  textarea{grid-column:span 1}
}
</style>
</head>

<body>

<div class="container">

<h1>Plan Your Nepal Journey</h1>

<div class="form-box">

<form id="planForm">

<div class="grid">

<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>

<input type="text" id="phone" placeholder="WhatsApp Number">

<select id="experience">
<option value="">Select Experience</option>

<!-- SIGNATURE -->
<optgroup label="⭐ Signature Experiences">
<option>Live Like a Nepali</option>
<option>Village Immersion Experience</option>
<option>Rice Planting Festival Experience</option>
<option>Women Only Cultural Trek</option>
<option>Himalayan Proposal Experience</option>
</optgroup>

<!-- TREKKING -->
<optgroup label="🏔 Trekking & Mountains">
<option>Annapurna Base Camp Trek</option>
<option>Everest Base Camp Trek</option>
<option>Everest View Trek</option>
<option>Poon Hill Trek</option>
<option>Mardi Himal Trek</option>
<option>Langtang Valley Trek</option>
<option>Khopra Danda Trek</option>
<option>Rara Lake Trek</option>
<option>Upper Mustang Jeep Tour</option>
</optgroup>

<!-- CULTURE -->
<optgroup label="🛕 Culture & Heritage">
<option>Kathmandu Heritage Tour</option>
<option>Bhaktapur Cultural Experience</option>
<option>Patan Heritage Walk</option>
<option>Lumbini Spiritual Journey</option>
<option>Monastery Stay Experience</option>
</optgroup>

<!-- FOOD -->
<optgroup label="🍲 Food Experiences">
<option>Momo Making Experience</option>
<option>Dal Bhat Cooking Class</option>
<option>Kathmandu Food Walk</option>
<option>Local Market + Cooking Experience</option>
</optgroup>

<!-- FESTIVAL -->
<optgroup label="🎉 Festivals">
<option>Dashain Experience</option>
<option>Tihar Festival Experience</option>
<option>Holi Festival Experience</option>
<option>Indra Jatra Experience</option>
<option>Chhath Festival Experience</option>
</optgroup>

<!-- ADVENTURE -->
<optgroup label="🌊 Adventure">
<option>Paragliding in Pokhara</option>
<option>White Water Rafting</option>
<option>Bungee Jumping</option>
<option>Zipline Adventure</option>
<option>Himalayan Motorbike Tour</option>
<option>Mountain Biking Trails</option>
</optgroup>

<!-- WELLNESS -->
<optgroup label="🧘 Wellness">
<option>Yoga & Meditation Retreat</option>
<option>Pokhara Wellness Escape</option>
<option>Spiritual Healing Retreat</option>
</optgroup>

<!-- CUSTOM -->
<optgroup label="✨ Custom">
<option>Custom Trip (I will decide later)</option>
</optgroup>

</select>

<select id="style">
<option value="">Travel Style</option>
<option value="1">Budget</option>
<option value="1.5">Comfort</option>
<option value="2">Luxury</option>
</select>

<textarea id="message" placeholder="Tell us your dream trip..."></textarea>

</div>

<div class="price-box">
<h3>Estimated Price</h3>
<p id="price">Select options to see estimate</p>
</div>

<button class="btn">Submit Inquiry</button>

</form>

</div>

</div>

<!-- WhatsApp -->
<div class="whatsapp">
<a id="waBtn" href="#" target="_blank">Chat on WhatsApp</a>
</div>

<script>

// AUTO GET EXPERIENCE FROM URL
const params = new URLSearchParams(window.location.search);
const exp = params.get("experience");

if(exp){
  document.getElementById("experience").value = decodeURIComponent(exp);
}

// PRICE CALCULATOR
function calculatePrice(){
  const days = document.getElementById("days").value || 0;
  const group = document.getElementById("group").value || 1;
  const style = document.getElementById("style").value || 1;

  if(days > 0){
    let base = 50; // base per day
    let total = days * base * group * style;

    document.getElementById("price").innerText = 
      "$" + total + " (approx)";
  }
}

document.querySelectorAll("#days,#group,#style").forEach(el=>{
  el.addEventListener("input",calculatePrice);
});

// WHATSAPP AUTO MESSAGE
document.getElementById("planForm").addEventListener("submit",function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const exp = document.getElementById("experience").value;
  const days = document.getElementById("days").value;
  const group = document.getElementById("group").value;

  const message = encodeURIComponent(
`Hi Rigan, I want to plan a trip.

Name: ${name}
Experience: ${exp}
Days: ${days}
Group: ${group}`
  );

  window.open(`https://wa.me/9779843322695?text=${message}`);
});

</script>

</body>
</html>
