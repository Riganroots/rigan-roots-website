<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiences | Rigan Roots & Routes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary:#991b1b;
  --gradient:linear-gradient(135deg,#f59e0b,#dc2626,#7c2d12);
  --stone-50:#fafaf9;
  --stone-200:#e7e5e4;
  --stone-600:#57534e;
  --stone-900:#1c1917;
  --radius-xl:28px;
  --radius-lg:20px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:var(--stone-50);
  color:var(--stone-600);
}

/* NAV */
.navbar{
  position:sticky;top:0;background:white;
  z-index:1000;
  border-bottom:1px solid rgba(0,0,0,.05);
}

.nav-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  padding:16px;
}

.brand{
  display:flex;
  gap:10px;
  text-decoration:none;
}

.brand-logo{
  width:40px;height:40px;
  background:var(--gradient);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:white;font-weight:800;
}

.brand-name{font-weight:700;color:var(--stone-900)}

.nav-links{
  display:flex;gap:20px;
}

.nav-links a{
  text-decoration:none;
  color:var(--stone-600);
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 20px;
}

.hero h1{
  font-family:'Playfair Display';
  font-size:clamp(36px,6vw,60px);
  color:var(--stone-900);
}

.hero p{
  max-width:600px;
  margin:auto;
}

/* MANDALA */
.mandala{
  position:relative;
  height:500px;
  margin:40px auto;
  max-width:700px;
}

.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:180px;height:180px;
  border-radius:50%;
  background:var(--gradient);
  color:white;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  text-align:center;
}

.cat{
  position:absolute;
  width:110px;height:110px;
  border-radius:50%;
  background:white;
  border:none;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.cat.active{
  background:var(--primary);
  color:white;
}

.c1{top:0;left:50%;transform:translateX(-50%)}
.c2{right:0;top:120px}
.c3{right:0;bottom:120px}
.c4{bottom:0;left:50%;transform:translateX(-50%)}
.c5{left:0;bottom:120px}
.c6{left:0;top:120px}

/* CARDS */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.1);
  text-decoration:none;
  color:inherit;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body{
  padding:16px;
}

.card-body h3{
  font-size:18px;
  color:var(--stone-900);
}

.meta{
  margin-top:10px;
  display:flex;
  gap:8px;
}

.meta span{
  background:#f3f4f6;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

/* MOBILE */
@media(max-width:768px){
  .mandala{display:none}
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="brand">
      <div class="brand-logo">RR</div>
      <div class="brand-name">Rigan</div>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="plan.html">Plan</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Choose Your Nepal Experience</h1>
  <p>Pick your travel mood. We’ll take you deeper.</p>
</section>

<!-- MANDALA -->
<div class="mandala">
  <div class="center">
    <h2>Nepal</h2>
    <small>Feel it</small>
  </div>

  <button class="cat c1 active" data="signature">⭐</button>
  <button class="cat c2" data="village">🏡</button>
  <button class="cat c3" data="food">🍲</button>
  <button class="cat c4" data="festival">🎉</button>
  <button class="cat c5" data="trek">🏔️</button>
  <button class="cat c6" data="adventure">🌊</button>
</div>

<!-- RESULTS -->
<div class="container">
  <div class="grid" id="grid"></div>
</div>

<script>
const data = {
  signature:[
    ["Live Like a Nepali","7 Days","live","https://i.postimg.cc/9M6dDyqv/live-like-nepali-jpg.jpg"],
    ["Village Immersion","5 Days","village","https://i.postimg.cc/sXQPfT1b/village-immersion-jpg.jpg"]
  ],
  village:[
    ["Farm Experience","2 Days","farm","https://i.postimg.cc/V6xprDjC/anjoe-paul-RANHGW3gv-Kk-unsplash.jpg"]
  ],
  food:[
    ["Momo Making","1 Day","momo","https://i.postimg.cc/9M6dDy7m/taste-of-nepal-jpg.jpg"]
  ],
  festival:[
    ["Dashain","3 Days","dashain","https://i.postimg.cc/SsB6ncz1/festival-experience-jpg.jpg"]
  ],
  trek:[
    ["Annapurna Base Camp","12 Days","abc","https://i.postimg.cc/VNHBcxsc/annapurna-base-camp-jpg.jpg"]
  ],
  adventure:[
    ["Paragliding","Half Day","para","https://i.postimg.cc/RZ4T11b5/paraglidin-in-pokhara-jpg.jpg"]
  ]
};

const grid=document.getElementById("grid");
const buttons=document.querySelectorAll(".cat");

function render(cat){
  grid.innerHTML=data[cat].map(item=>`
    <a class="card" href="plan.html?experience=${item[0]}">
      <img src="${item[3]}">
      <div class="card-body">
        <h3>${item[0]}</h3>
        <div class="meta">
          <span>${item[1]}</span>
          <span>View</span>
        </div>
      </div>
    </a>
  `).join("");
}

buttons.forEach(btn=>{
  btn.onclick=()=>{
    buttons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render(btn.dataset);
  }
});

render("signature");
</script>

</body>
</html>
